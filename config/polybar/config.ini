[colors]
black= #000000
white= #FFFFFF
red= #FF0000
green= #00FF00
blue= #0000FF
yellow= #FFFF00
cyan= #00FFFF
magenta= #FF00FF
gray= #808080
brown= #A52A2A
orange= #FFA500
purple= #800080
pink= #FFC0CB
lime= #00FF00
teal= #008080

background = #ff282A2E
background-alt = #ff373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/mainbar]
; monitor=eDP1

width = 100%
height = 21pt
radius = 0
bottom = false

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Source Code Pro:style=Regular:size=11;0"
font-1 = "feather:style=Regular:size=11;2"
font-2 = "Font Awesome 5 Free:style=Regular:size=11;2"

; font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10.5;1"
; font-2 = "Hack Nerd Font Mono:style=Regular:size=11;2"
; font-3 = "Hack Nerd Font Mono:style=Italic:size=11;2"

; modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date

modules-left = i3 xwindow
; modules-right = pulseaudio battery brightness memory cpu wlan eth datetime weather
modules-right = pulseaudio battery memory cpu wlan weather datetime

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = false

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.alert}

label-focused = %name%
label-focused-background = ${colors.background}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

; label-unfocused = %index%: %name%
label-unfocused = %index%
label-unfocused-padding = 2

; label-urgent = %index%: %name%
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%
label-muted = MUTE
; label-muted = 
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %{F#F0C674}NET%{F-} %essid%
label-disconnected=

[module/network]
type = custom/script
exec = python3 ~/scripts/net.py 2>/dev/null
interval = 1

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/datetime]
type = custom/script
exec = echo $(date +"%a, %b %d %I:%M %p")
interval = 10

[module/uptime]
type = custom/script
; exec = echo $(uptime --pretty | cut -d"," -f1)
exec = python3 ~/scripts/uptime.py 2>/dev/null
interval = 10

[module/weather]
type = custom/script
exec = python3 ~/scripts/weather.py 2>/dev/null
label = %output%
format-prefix = ""
format-prefix-foreground = ${colors.primary}
interval = 10
label-active-font = 1

[module/brightness]
type = custom/script
exec = ~/scripts/brightness.sh
label = %output%
format-prefix=" "
interval = 1

[module/battery]
type = custom/script
exec = ~/scripts/battery.sh
label = %output%
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}

[module/dunst]
type = custom/ipc
initial = 1
; format-foreground = ${colors.yellow}
hook-0 = echo "%{A1:dunstctl set-paused true && polybar-msg hook dunst 2:}%{A}" &
hook-1 = echo "%{A1:dunstctl set-paused false && polybar-msg hook dunst 1:}%{A}" &

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
