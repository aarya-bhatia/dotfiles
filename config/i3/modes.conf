# resize window
mode "resize" {
  bindsym h resize shrink width 10 px or 10 ppt
  bindsym k resize grow height 10 px or 10 ppt
  bindsym j resize shrink height 10 px or 10 ppt
  bindsym l resize grow width 10 px or 10 ppt

  bindsym Return mode "default"
  bindsym Escape mode "default"
  bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"

set $mode_launcher Launch: [f]irefox [t]hunderbird [c]hrome [d]iscord [s]lack [v]lc
mode "$mode_launcher" {
    bindsym f exec --no-startup-id firefox
    bindsym t exec --no-startup-id thunderbird
    bindsym c exec --no-startup-id chromium
    bindsym d exec --no-startup-id discord
    bindsym s exec --no-startup-id slack
    bindsym v exec --no-startup-id vlc

    bindsym Escape mode "default"
    bindsym Return mode "default"
}
bindsym $mod+o mode "$mode_launcher"

set $Locker i3lock && sleep 1
set $mode_power [l]lock [e]logout [s]suspend [h]hibernate [r]reboot [S]shutdown
mode "$mode_power" {
    bindsym l exec --no-startup-id i3lock -c 009999 && sleep 300 && systemctl suspend, mode "default"
	bindsym e exec --no-startup-id i3-msg exit, mode "default"
	bindsym s exec --no-startup-id $Locker && systemctl suspend, mode "default"
	bindsym h exec --no-startup-id $Locker && systemctl hibernate, mode "default"
	bindsym r exec --no-startup-id systemctl reboot, mode "default"
	bindsym Shift+s exec --no-startup-id systemctl poweroff -i, mode "default"

    bindsym Escape mode "default"
    bindsym Return mode "default"
}
bindsym $mod+Escape mode "$mode_power"
