include-file        = $HOME/.config/polybar/modules.ini

[colors]
background          = #ee282A2E
background-alt      = #373B41
foreground          = #C5C8C6
primary             = #268BD2
secondary           = #8ABEB7
alert               = #A54242
disabled            = #707880

black               = #000
white               = #fff
grey                = #aaa
darkgrey            = #555
red                 = #f00
green               = #0f0

label               = #a7a5a5

[bar/example]
width               = 100%
height              = 22pt
radius              = 0

override-redirect   = true

background          = ${colors.black}
foreground          = ${colors.white}

line-size           = 3pt

border-size         = 0pt
border-color        = ${colors.grey}

padding-left        = 1
padding-right       = 1

margin-top          = 0
margin-bottom       = 0

module-margin       = 1

monitor             = ${env:MONITOR:eDP-1}

font-0              = "UbuntuMono:size=11.5;1"
font-1              = "Hack;1"
font-2              = "Font Awesome 6 Free:size=10;2"
font-3              = "Font Awesome 6 Brands:size=10;2"
font-4              = "Font Awesome 6 Free Solid:size=10;2"

cursor-click        = pointer
cursor-scroll       = ns-resize

enable-ipc          = true

[settings]
screenchange-reload = true
pseudo-transparency = true

[bar/i3]
inherit             = bar/example
override-redirect   = false
modules-left        = i3 xwindow
modules-center      = my_mpd
modules-right       = my_volume my_battery my_wifi my_memory my_weather my_date

[bar/bspwm]
inherit             = bar/example
wm-restack          = bspwm
modules-left        = my_bspwm my_window_count xwindow
modules-right       = my_mpd my_weather my_volume my_battery my_wifi my_memory my_date my_dunst

; vim:ft=dosini
