[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #268BD2
secondary = #8ABEB7
alert = #A54242
disabled = #707880

black = #000
white = #fff
grey = #aaa
darkgrey = #555
red = #f00
green = #0f0

[bar/example]
width = 100%
height = 24pt
radius = 0

monitor = eDP-1

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

# separator = |
# separator-foreground = ${colors.disabled}

font-0 = "Hack Nerd Font:size=9.5;1"
font-1 = "Font Awesome 6 Free"
font-2 = "Font Awesome 6 Brands"
font-3 = "Font Awesome 6 Free Solid"
font-4 = "Noto Color Emoji"

modules-left =
modules-right = my_kernel my_packages my_disk memory cpu my_volume my_brightness my_weather my_battery my_wifi my_date my_dunst

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = i3
; override-redirect = true

[settings]
screenchange-reload = true
pseudo-transparency = true

include-file=$HOME/.config/polybar/internal.ini
include-file=$HOME/.config/polybar/custom.ini

[bar/bspwm]
inherit = bar/example
wm-restack = bspwm
modules-left = bspwm
modules-center = xwindow
modules-right = my_date my_dunst
tray-position=right

[bar/bspwm1]
wm-restack = bspwm
inherit = bar/bspwm
monitor = HDMI-1

[bar/bottom]
inherit = bar/example
monitor = ${env:MONITOR:eDP-1}
bottom = true
wm-restack = bspwm

separator=\
separator-foreground=${colors.darkgrey}
background=#3c3836
foreground=#fbf1c7

module-margin = 2
padding = 1

modules-center = my_kernel my_packages my_disk my_battery memory cpu my_volume my_brightness my_weather my_wifi my_date
modules-left=
modules-right=

[bar/i3]
inherit = bar/example
monitor = eDP-1
modules-left = i3
tray-position=right

; vim:ft=dosini
