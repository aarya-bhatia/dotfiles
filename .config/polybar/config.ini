[colors]
background          = #ee282A2E
background-alt      = #373B41
foreground          = #C5C8C6
primary             = #268BD2
secondary           = #8ABEB7
alert               = #A54242
disabled            = #707880

black               = #000
white               = #fff
grey                = #aaa
darkgrey            = #555
red                 = #f00
green               = #0f0

[bar/example]
width               = 100%
height              = 24pt
radius              = 0

; dpi = 96

background          = ${colors.background}
foreground          = ${colors.foreground}

line-size           = 3pt

border-size         = 0pt
border-color        = #00000000

padding-left        = 1
padding-right       = 1

margin-top = 0
margin-bottom = 0

module-margin       = 1

monitor             = ${env:MONITOR:eDP-1}

font-0              = "Hack:size=9.5;1"
font-1              = "Font Awesome 6 Free:size=10;2"
font-2              = "Font Awesome 6 Brands:size=10;2"
font-3              = "Font Awesome 6 Free Solid:size=10;2"

cursor-click        = pointer
cursor-scroll       = ns-resize

enable-ipc          = true
wm-restack          = bspwm
; tray-position       = right

; override-redirect = true

[settings]
screenchange-reload = true
pseudo-transparency = true

include-file        = $HOME/.config/polybar/modules.ini
include-file        = $HOME/.config/polybar/internal.ini

[bar/bspwm]
inherit             = bar/example
modules-left        = my_bspwm xwindow
modules-right       = my_volume my_cpu my_disk my_memory my_weather my_battery my_brightness my_date
background          = ${colors.background}
foreground          = ${colors.foreground}

; vim:ft=dosini
