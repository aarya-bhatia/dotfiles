[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #268BD2
secondary = #8ABEB7
alert = #A54242
disabled = #707880

black = #000
white = #fff
grey = #aaa
darkgrey = #555
red = #f00
green = #0f0

[bar/example]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

# separator = |
# separator-foreground = ${colors.disabled}

monitor = ${env:MONITOR:eDP-1}

font-0 = "FreeMono:style=Regular:size=10.5;1"
font-1 = "Font Awesome 6 Free:size=10;2"
font-2 = "Font Awesome 6 Brands:size=10;2"
font-3 = "Font Awesome 6 Free Solid:size=10;2"

modules-left =
modules-right = my_kernel my_packages my_disk memory cpu my_volume my_brightness my_weather my_battery my_wifi my_date my_dunst

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = i3
; override-redirect = true

[settings]
screenchange-reload = true
pseudo-transparency = true

include-file=$HOME/.config/polybar/internal.ini
include-file=$HOME/.config/polybar/custom.ini

[bar/bspwm]
inherit = bar/example
wm-restack = bspwm
modules-center = bspwm
modules-left = xwindow
modules-right = my_volume my_battery my_date my_dunst
background=${colors.black}
foreground=${colors.white}

[bar/bottom]
inherit = bar/bspwm
bottom = true
font-0 = "Hack Nerd Font:size=9.5"
# modules-center = my_kernel my_packages my_disk memory cpu my_weather my_wifi
modules-left = my_status_bar
modules-center =
modules-right =

[bar/i3]
inherit = bar/example
modules-left = i3
tray-position=right

; vim:ft=dosini
