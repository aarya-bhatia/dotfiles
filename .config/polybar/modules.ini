[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = false
wrapping-scroll = false

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;;
ws-icon-6 = 7;;
ws-icon-7 = 8;;
ws-icon-8 = 9;;
ws-icon-default = 

; Only show workspaces on the same output as the bar
;pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = #000000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %name%
label-focused-background =
label-focused-foreground = ${colors.secondary}
label-focused-underline = ${colors.secondary}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %name%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.primary}
label-unfocused-underline =

; visible = Active workspace on unfocused monitor
label-visible = %name%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

; Separator in between workspaces
; label-separator = |


[module/xwindow]
type                = internal/xwindow
label               = %title:0:45:...%

[network-base]
type                = internal/network
interval            = 5
format-connected    = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected  = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit             = network-base
interface-type      = wireless
label-connected     = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit             = network-base
interface-type      = wired
label-connected     = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/my_bspwm]
type        = custom/script
tail        = true
exec        = bspwm_workspaces.py

[module/my_memory]
type        = custom/script
exec        = sb-memory
interval    = 5
label       = %{F#ffcb32}Mem %{F-}%output%

[module/my_date]
type        = custom/script
exec        = sb-date
interval    = 5
label       = %{F#ffcb32}Clk %{F-}%output%

[module/my_battery]
type        = custom/script
exec        = sb-battery
interval    = 5
label       = %{F#ffcb32}Bat %{F-}%output%

[module/my_disk]
type        = custom/script
exec        = sb-disk
interval    = 5
label       = %{F#ffcb32}Used %{F-}%output%

[module/my_weather]
type        = custom/script
exec        = sb-weather 2>/dev/null
interval    = 20
label       = %{F#ffcb32}Temp %{F-}%output%

[module/my_wifi]
type        = custom/script
exec        = sb-wifi
interval    = 20
label       = %{F#ffcb32}Net %{F-}%output%

[module/my_volume]
type        = custom/ipc
format      = <label>
hook-0      = sb-volume
initial     = 1
click-left  = volume.sh mute
click-right = pavucontrol
label       = %{F#ffcb32}Vol %{F-}%output%

[module/my_window_count]
type        = custom/script
tail        = true
exec        = ~/scripts/lemonbar/window_count.sh

[module/my_mpd]
type        = custom/script
interval    = 5
exec        = sb-mpd

