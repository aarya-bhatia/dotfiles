[module/my_date]
type = custom/script
exec = /home/aarya/scripts/lemonbar/date.sh
interval = 5

[module/my_battery]
type = custom/script
exec = /home/aarya/scripts/lemonbar/battery.sh
interval = 5

[module/my_kernel]
type = custom/script
exec = /home/aarya/scripts/lemonbar/kernel.sh

[module/my_packages]
type = custom/script
exec = /home/aarya/scripts/lemonbar/packages.sh
interval = 600

[module/my_disk]
type = custom/script
exec = /home/aarya/scripts/disk.py
interval = 10

[module/my_weather]
type = custom/script
exec = /home/aarya/scripts/weather.py 2>/dev/null || echo ""
exec-if = curl --head https://google.com
interval = 300

[module/my_wifi]
type = custom/script
exec = /home/aarya/scripts/lemonbar/wifi.sh 2>/dev/null
interval = 300

[module/my_volume]
type = custom/ipc
format = <label>
hook-0 = /home/aarya/scripts/lemonbar/volume.sh
initial = 1
click-left = /home/aarya/scripts/volume.sh mute
click-right = pavucontrol

[module/my_brightness]
type = custom/ipc
format = <label>
hook-0 = /home/aarya/scripts/lemonbar/brightness.sh
initial = 1

[module/my_dunst]
type = custom/ipc
hook-0 = /home/aarya/scripts/lemonbar/dunst.sh
hook-1 = /home/aarya/scripts/lemonbar/dunst.sh --click
initial=1
format=<label>
format-1=<label>
click-left = "#my_dunst.hook.1"

[module/my_i3]
type = custom/script
exec = /home/aarya/scripts/lemonbar/i3.py
tail = true
